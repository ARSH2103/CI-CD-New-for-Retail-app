<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Retail Store</title>
  <title>Retail Store</title>
  <title>Retail Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    header { background: #1a1a1a; color: #fff; padding: 1.2rem 2rem; text-align: center; }
    header h1 { font-size: 1.8rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; padding: 2rem; max-width: 1000px; margin: 0 auto; }
    .card { background: #fff; border-radius: 10px; padding: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .card h3 { margin-bottom: 0.5rem; }
    .card .price { font-size: 1.2rem; font-weight: bold; color: #e74c3c; margin-bottom: 1rem; }
    .card .category { font-size: 0.75rem; color: #999; margin-bottom: 0.5rem; text-transform: uppercase; }
    button { background: #1a1a1a; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; width: 100%; }
    button:hover { background: #e74c3c; }
  </style>
</head>
<body>
  <header><h1>🛒 Retail Store</h1></header>
  <header><h1>🛒 Retail Store</h1></header>



  <div class="grid" id="products"></div>
  <script>
    fetch('/products')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('products');
        data.forEach(p => {
          container.innerHTML += `
            <div class="card">
              <div class="category">${p.category}</div>
              <h3>${p.name}</h3>
              <div class="price">₹${p.price.toLocaleString('en-IN')}</div>
              <button>Add to Cart</button>
            </div>`;
        });
      });
  </script>
</body>
</html>
